<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl — O'quv markazi tizimi</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --b0: #06080f;
            --b1: #0c0f1d;
            --b2: #111527;
            --b3: #171c30;
            --b4: #1d2238;
            --bd: rgba(255, 255, 255, 0.07);
            --bd2: rgba(255, 255, 255, 0.13);
            --ac: #4f87f6;
            --ac2: rgba(79, 135, 246, 0.14);
            --acg: rgba(79, 135, 246, 0.22);
            --gr: #18c97a;
            --gr2: rgba(24, 201, 122, 0.12);
            --re: #ef4f4e;
            --re2: rgba(239, 79, 78, 0.12);
            --am: #f5a400;
            --am2: rgba(245, 164, 0, 0.12);
            --pu: #9b70f5;
            --pu2: rgba(155, 112, 245, 0.12);
            --go: #f5c400;
            --go2: rgba(245, 196, 0, 0.12);
            --t0: #e8eaf8;
            --t1: #7c85ae;
            --t2: #424b6a;
            --fn: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --r: 5px;
            --r2: 10px;
            --sh: 0 8px 32px rgba(0, 0, 0, .55)
        }

        body {
            font-family: var(--fn);
            background: var(--b0);
            color: var(--t0);
            min-height: 100vh
        }

        input,
        select,
        button,
        textarea {
            font-family: var(--fn)
        }

        /* LOGIN */
        .lpg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(ellipse at 20% 50%, rgba(79, 135, 246, .06) 0%, transparent 60%), var(--b0)
        }

        .lcard {
            background: var(--b1);
            border: 1px solid var(--bd2);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            max-width: 100%;
            box-shadow: var(--sh)
        }

        .llogo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px
        }

        .llogo-i {
            width: 40px;
            height: 40px;
            background: var(--ac);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .llogo-i svg {
            width: 21px;
            height: 21px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.2
        }

        .llogo-n {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -.3px
        }

        .llogo-s {
            font-size: 11px;
            color: var(--t2);
            margin-top: 1px
        }

        .ltitle {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -.5px;
            margin-bottom: 5px
        }

        .lsub {
            font-size: 13px;
            color: var(--t1);
            margin-bottom: 20px
        }

        .hbox {
            background: var(--b2);
            border: 1px solid var(--bd);
            border-radius: var(--r);
            padding: 13px 15px;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--t1);
            line-height: 1.9
        }

        .hbox b {
            color: var(--t0);
            font-weight: 500
        }

        .fg {
            margin-bottom: 13px
        }

        .fl {
            display: block;
            font-size: 10.5px;
            color: var(--t2);
            text-transform: uppercase;
            letter-spacing: .8px;
            font-weight: 500;
            margin-bottom: 5px
        }

        .fi {
            width: 100%;
            padding: 9px 13px;
            background: var(--b2);
            border: 1px solid var(--bd);
            border-radius: var(--r);
            color: var(--t0);
            font-size: 13.5px;
            outline: none;
            transition: border-color .15s, box-shadow .15s
        }

        .fi:focus {
            border-color: var(--ac);
            box-shadow: 0 0 0 3px var(--acg)
        }

        .fi::placeholder {
            color: var(--t2)
        }

        select.fi option {
            background: var(--b2)
        }

        textarea.fi {
            resize: vertical;
            min-height: 72px
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--bd2);
            background: var(--b2);
            color: var(--t1);
            transition: all .15s;
            white-space: nowrap;
            letter-spacing: .1px
        }

        .btn:hover {
            background: var(--b3);
            color: var(--t0)
        }

        .btn:active {
            transform: scale(.98)
        }

        .btn-p {
            background: var(--ac);
            border-color: var(--ac);
            color: #fff;
            box-shadow: 0 0 18px var(--acg)
        }

        .btn-p:hover {
            background: #3d77e8;
            border-color: #3d77e8;
            color: #fff
        }

        .btn-g {
            border-color: rgba(24, 201, 122, .25);
            color: var(--gr)
        }

        .btn-g:hover {
            background: var(--gr2)
        }

        .btn-r {
            border-color: rgba(239, 79, 78, .25);
            color: var(--re)
        }

        .btn-r:hover {
            background: var(--re2)
        }

        .btn-go {
            border-color: rgba(245, 196, 0, .25);
            color: var(--go)
        }

        .btn-go:hover {
            background: var(--go2)
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11.5px;
            border-radius: 4px
        }

        .btn-fw {
            width: 100%;
            padding: 11px;
            font-size: 14px
        }

        /* SHELL */
        .shell {
            display: flex;
            min-height: 100vh
        }

        /* SIDEBAR */
        .sb {
            width: 214px;
            flex-shrink: 0;
            background: var(--b1);
            border-right: 1px solid var(--bd);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto
        }

        .sbl {
            padding: 19px 15px 15px;
            border-bottom: 1px solid var(--bd)
        }

        .sbl-row {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .sbl-ic {
            width: 29px;
            height: 29px;
            background: var(--ac);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .sbl-ic svg {
            width: 15px;
            height: 15px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.2
        }

        .sbl-n {
            font-size: 13.5px;
            font-weight: 700
        }

        .sbl-s {
            font-size: 10px;
            color: var(--t2);
            margin-top: 1px
        }

        .sb-sec {
            padding: 13px 13px 3px;
            font-size: 9.5px;
            color: var(--t2);
            text-transform: uppercase;
            letter-spacing: 1.1px;
            font-weight: 600
        }

        .sb-nav {
            padding: 3px 7px
        }

        .si {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 9px;
            margin-bottom: 2px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            color: var(--t1);
            border: 1px solid transparent;
            transition: all .15s
        }

        .si:hover {
            background: var(--b2);
            color: var(--t0)
        }

        .si.active {
            background: var(--ac2);
            color: var(--ac);
            border-color: rgba(79, 135, 246, .18);
            font-weight: 500
        }

        .si svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0
        }

        .si-bdg {
            margin-left: auto;
            background: var(--re);
            color: #fff;
            font-size: 9.5px;
            padding: 1px 5px;
            border-radius: 8px;
            font-weight: 700;
            min-width: 16px;
            text-align: center
        }

        .sb-ft {
            margin-top: auto;
            padding: 13px;
            border-top: 1px solid var(--bd)
        }

        .sb-usr {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .sb-av {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0
        }

        .sb-un {
            font-size: 12.5px;
            font-weight: 500
        }

        .sb-ur {
            font-size: 10px;
            color: var(--t2)
        }

        .sb-lo {
            cursor: pointer;
            margin-left: auto;
            color: var(--t2);
            transition: color .15s
        }

        .sb-lo:hover {
            color: var(--re)
        }

        /* TOPBAR */
        .topbar {
            height: 54px;
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            background: var(--b0);
            position: sticky;
            top: 0;
            z-index: 5
        }

        .tb-t {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -.2px
        }

        .tb-r {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .cc {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--go2);
            border: 1px solid rgba(245, 196, 0, .2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--go)
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0
        }

        .cnt {
            flex: 1;
            padding: 20px;
            overflow-y: auto
        }

        .pg {
            display: none;
            animation: pgIn .25s ease
        }

        .pg.active {
            display: block
        }

        @keyframes pgIn {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* METRICS */
        .mcs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px
        }

        .mc {
            background: var(--b1);
            border: 1px solid var(--bd);
            border-radius: var(--r2);
            padding: 15px;
            transition: border-color .2s, transform .2s
        }

        .mc:hover {
            border-color: var(--bd2);
            transform: translateY(-1px)
        }

        .mc-l {
            font-size: 10px;
            color: var(--t2);
            text-transform: uppercase;
            letter-spacing: .8px;
            font-weight: 500;
            margin-bottom: 7px
        }

        .mc-v {
            font-size: 23px;
            font-weight: 700;
            letter-spacing: -1px
        }

        .mc-s {
            font-size: 11.5px;
            color: var(--t1);
            margin-top: 4px
        }

        /* TABLE */
        .tc {
            background: var(--b1);
            border: 1px solid var(--bd);
            border-radius: var(--r2);
            overflow: hidden
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        thead tr {
            border-bottom: 1px solid var(--bd)
        }

        th {
            padding: 9px 13px;
            text-align: left;
            font-size: 10px;
            color: var(--t2);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .6px
        }

        td {
            padding: 10px 13px;
            border-bottom: 1px solid var(--bd);
            vertical-align: middle
        }

        tbody tr:last-child td {
            border-bottom: none
        }

        tbody tr {
            transition: background .1s
        }

        tbody tr:hover td {
            background: rgba(255, 255, 255, .02)
        }

        /* AVATAR */
        .av {
            width: 27px;
            height: 27px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0
        }

        .av0 {
            background: rgba(79, 135, 246, .15);
            color: var(--ac)
        }

        .av1 {
            background: rgba(24, 201, 122, .15);
            color: var(--gr)
        }

        .av2 {
            background: rgba(155, 112, 245, .15);
            color: var(--pu)
        }

        .av3 {
            background: rgba(245, 164, 0, .15);
            color: var(--am)
        }

        .nc {
            display: flex;
            align-items: center;
            gap: 8px
        }

        /* PILLS */
        .pl {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500
        }

        .pl::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .p-gr {
            background: var(--gr2);
            color: var(--gr);
            border: 1px solid rgba(24, 201, 122, .2)
        }

        .p-gr::before {
            background: var(--gr)
        }

        .p-re {
            background: var(--re2);
            color: var(--re);
            border: 1px solid rgba(239, 79, 78, .2)
        }

        .p-re::before {
            background: var(--re)
        }

        .p-am {
            background: var(--am2);
            color: var(--am);
            border: 1px solid rgba(245, 164, 0, .2)
        }

        .p-am::before {
            background: var(--am)
        }

        .p-bl {
            background: var(--ac2);
            color: var(--ac);
            border: 1px solid rgba(79, 135, 246, .2)
        }

        .p-bl::before {
            background: var(--ac)
        }

        .p-go {
            background: var(--go2);
            color: var(--go);
            border: 1px solid rgba(245, 196, 0, .2)
        }

        .p-go::before {
            background: var(--go)
        }

        .p-gy {
            background: rgba(255, 255, 255, .05);
            color: var(--t1);
            border: 1px solid var(--bd)
        }

        .p-gy::before {
            background: var(--t1)
        }

        .p-pu {
            background: var(--pu2);
            color: var(--pu);
            border: 1px solid rgba(155, 112, 245, .2)
        }

        .p-pu::before {
            background: var(--pu)
        }

        /* CARDS */
        .card {
            background: var(--b1);
            border: 1px solid var(--bd);
            border-radius: var(--r2);
            padding: 16px;
            margin-bottom: 10px;
            transition: border-color .2s
        }

        .card:hover {
            border-color: var(--bd2)
        }

        .ct {
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 4px
        }

        .cd {
            font-size: 12px;
            color: var(--t1);
            margin-bottom: 10px;
            line-height: 1.5
        }

        .cf {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap
        }

        /* MARKET */
        .mkt {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px
        }

        .mktc {
            background: var(--b1);
            border: 1px solid var(--bd);
            border-radius: var(--r2);
            padding: 22px 18px;
            text-align: center;
            transition: all .2s;
            position: relative;
            overflow: hidden
        }

        .mktc:hover {
            border-color: var(--bd2);
            transform: translateY(-2px);
            box-shadow: var(--sh)
        }

        .mktc-e {
            font-size: 46px;
            margin-bottom: 10px;
            display: block
        }

        .mktc-n {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px
        }

        .mktc-d {
            font-size: 11.5px;
            color: var(--t1);
            margin-bottom: 12px
        }

        .mktc-p {
            font-size: 20px;
            font-weight: 700;
            color: var(--go);
            margin-bottom: 13px
        }

        /* SECTION HEADER */
        .sh {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .sht {
            font-size: 14px;
            font-weight: 600
        }

        .g2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        /* MODAL */
        .mbg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .78);
            backdrop-filter: blur(3px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center
        }

        .mbg.open {
            display: flex;
            animation: mIn .18s
        }

        @keyframes mIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .modal {
            background: var(--b1);
            border: 1px solid var(--bd2);
            border-radius: 14px;
            width: 450px;
            max-width: 95vw;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .7);
            animation: mUp .22s ease;
            max-height: 90vh;
            overflow-y: auto
        }

        @keyframes mUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .mh {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 17px 20px;
            border-bottom: 1px solid var(--bd)
        }

        .mh-t {
            font-size: 14px;
            font-weight: 600
        }

        .mcl {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            border: 1px solid var(--bd);
            background: var(--b2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--t2);
            font-size: 15px;
            transition: all .15s
        }

        .mcl:hover {
            background: var(--b3);
            color: var(--t0)
        }

        .mbody {
            padding: 18px 20px
        }

        .mfot {
            padding: 13px 20px;
            border-top: 1px solid var(--bd);
            display: flex;
            justify-content: flex-end;
            gap: 7px
        }

        .fr {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 11px
        }

        /* UPLOAD */
        .uz {
            border: 2px dashed var(--bd2);
            border-radius: 8px;
            padding: 22px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: var(--b2)
        }

        .uz:hover {
            border-color: var(--ac);
            background: var(--ac2)
        }

        .uz-t {
            font-size: 13px;
            color: var(--t1)
        }

        .uz-s {
            font-size: 11px;
            color: var(--t2);
            margin-top: 3px
        }

        .uprev {
            width: 100%;
            max-height: 190px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 10px;
            display: none
        }

        /* TOAST */
        #toasts {
            position: fixed;
            bottom: 18px;
            right: 18px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
            max-width: 280px
        }

        .toast {
            background: var(--b2);
            border: 1px solid var(--bd2);
            border-radius: 8px;
            padding: 9px 13px;
            font-size: 12px;
            color: var(--t0);
            display: flex;
            align-items: center;
            gap: 7px;
            animation: tIn .2s ease;
            box-shadow: var(--sh)
        }

        @keyframes tIn {
            from {
                opacity: 0;
                transform: translateX(8px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .td {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0
        }

        /* ATT ROW */
        .ar {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 0;
            border-bottom: 1px solid var(--bd)
        }

        .ar:last-child {
            border-bottom: none
        }

        /* IMAGE VIEWER */
        .iv {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            z-index: 400;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out
        }

        .iv.open {
            display: flex
        }

        .iv img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px
        }

        /* EMPTY */
        .empty {
            text-align: center;
            padding: 36px;
            color: var(--t1)
        }

        .empty-e {
            font-size: 28px;
            margin-bottom: 8px
        }

        .empty-t {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 3px
        }

        .empty-s {
            font-size: 11.5px;
            color: var(--t2)
        }

        /* STAGGER ANIMATION */
        @keyframes si {
            from {
                opacity: 0;
                transform: translateY(4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .st {
            opacity: 0;
            animation: si .28s ease forwards
        }

        hr {
            border: none;
            border-top: 1px solid var(--bd);
            margin: 13px 0
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--b4);
            border-radius: 2px
        }
    </style>
</head>

<body>

    <div id="ls"></div>
    <div id="app" style="display:none"></div>
    <div id="toasts"></div>
    <div class="iv" id="iv" onclick="this.classList.remove('open')">
        <img id="iv-img" src="" alt="preview">
    </div>

    <script>
        // ============================================================
        //  DATABASE (in-memory)
        // ============================================================
        const DB = {
            u: null,
            users: [
                { id: 0, name: 'Admin', login: 'admin', pass: 'admin123', role: 'admin', coins: 0 },
                { id: 1, name: 'Asadbek', login: 'asadbek', pass: '123', role: 'student', coins: 350 },
                { id: 2, name: 'Firdavs', login: 'firdavs', pass: '123', role: 'student', coins: 180 },
                { id: 3, name: 'Muhammadziyo', login: 'muhammadziyo', pass: '123', role: 'student', coins: 520 },
            ],
            tasks: [
                { id: 1, title: "IT", desc: "", coins: 80, to: 'all', deadline: '2025-03-20', at: '2025-03-10' },
            
            ],
            subs: [
                { id: 1, tid: 1, sid: 1, status: 'pending', img: null, date: '2025-03-14', coins: 0 },
                { id: 2, tid: 2, sid: 1, status: 'approved', img: null, date: '2025-03-13', coins: 50 },
            ],
            att: [
                { id: 1, sid: 1, date: '2025-03-14', t: 'came', time: '09:05' },
                { id: 2, sid: 2, date: '2025-03-14', t: 'came', time: '09:18' },
                { id: 3, sid: 3, date: '2025-03-14', t: 'came', time: '09:22' },
                { id: 4, sid: 1, date: '2025-03-14', t: 'left', time: '13:45' },
                { id: 5, sid: 1, date: '2025-03-13', t: 'came', time: '09:10' },
                { id: 6, sid: 2, date: '2025-03-13', t: 'came', time: '09:15' },
            ],
            mkt: [
                { id: 1, name: 'Futbolka', price: 2000, e: '👕', desc: 'Maktab futbolkasi (S,M,L,XL)', color: '#4f87f6' },
                { id: 2, name: 'Klaviatura', price: 3000, e: '⌨️', desc: 'Mexanik USB klaviatura', color: '#18c97a' },
                { id: 3, name: 'AirPods', price: 5000, e: '🎧', desc: 'Simsiz bluetooth quloqchin', color: '#9b70f5' },
            ],
            buys: [
                { id: 1, sid: 3, iid: 1, price: 2000, date: '2025-03-12' },
            ],
            nid: { task: 4, sub: 3, att: 7, buy: 2 }
        };

        // ============================================================
        //  HELPERS
        // ============================================================
        const $ = id => document.getElementById(id);
        const ini = n => n.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const today = () => new Date().toISOString().slice(0, 10);
        const nowT = () => new Date().toLocaleTimeString('uz', { hour: '2-digit', minute: '2-digit' });
        const uById = id => DB.users.find(u => u.id === id);
        const fc = v => `🪙 ${Number(v).toLocaleString()}`;
        const avC = i => ['av0', 'av1', 'av2', 'av3'][i % 4];
        const studs = () => DB.users.filter(u => u.role === 'student');

        // ============================================================
        //  ICONS
        // ============================================================
        const IC = {
            dash: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
            users: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>`,
            task: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,
            mkt: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
            att: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14l2 2 4-4"/></svg>`,
            out: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>`,
        };

        // ============================================================
        //  TOAST
        // ============================================================
        function toast(msg, type = 'ok') {
            const c = { ok: 'var(--gr)', err: 'var(--re)', info: 'var(--ac)', warn: 'var(--am)' };
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<div class="td" style="background:${c[type] || c.ok}"></div><span>${msg}</span>`;
            $('toasts').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2800);
        }

        function openM(id) { $(id).classList.add('open'); }
        function closeM(id) { $(id).classList.remove('open'); }

        function viewImg(subId) {
            const s = DB.subs.find(x => x.id === subId);
            if (!s || !s.img) return;
            $('iv-img').src = s.img;
            $('iv').classList.add('open');
        }

        // ============================================================
        //  LOGIN
        // ============================================================
        function renderLogin() {
            $('ls').innerHTML = `
  <div class="lpg">
    <div class="lcard">
      <div class="llogo">
        <div class="llogo-i">
          <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 6 10-6-10-6zM2 14l10 6 10-6M2 19l10 6 10-6"/></svg>
        </div>
        <div>
          <div class="llogo-n">EduControl</div>
          <div class="llogo-s">O'quv markazi tizimi</div>
        </div>
      </div>
      <div class="ltitle">Xush kelibsiz!</div>
      <div class="lsub">Hisobingizga kiring</div>
    
      <div class="fg">
        <label class="fl">Login</label>
        <input class="fi" id="l-login" placeholder="Login kiriting" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="fg">
        <label class="fl">Parol</label>
        <input class="fi" type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div id="l-err" style="color:var(--re);font-size:12px;margin-bottom:10px;display:none">
        ⚠ Login yoki parol xato!
      </div>
      <button class="btn btn-p btn-fw" onclick="doLogin()">Kirish →</button>
    </div>
  </div>`;
        }

        function doLogin() {
            const login = $('l-login').value.trim().toLowerCase();
            const pass = $('l-pass').value;
            const user = DB.users.find(u => u.login.toLowerCase() === login && u.pass === pass);
            if (!user) { $('l-err').style.display = 'block'; return; }
            DB.u = user;
            $('ls').style.display = 'none';
            $('app').style.display = 'block';
            user.role === 'admin' ? buildAdmin() : buildStudent();
        }

        function logout() {
            DB.u = null;
            $('app').innerHTML = '';
            $('ls').style.display = 'block';
            renderLogin();
        }

        // ============================================================
        //  SIDEBAR BUILDER (shared)
        // ============================================================
        function buildSidebar(items, user, role) {
            const si = studs().findIndex(s => s.id === user.id);
            const avS = user.role === 'admin'
                ? `background:linear-gradient(135deg,var(--ac),var(--pu))`
                : [`background:rgba(79,135,246,.3)`, `background:rgba(24,201,122,.3)`, `background:rgba(155,112,245,.3)`, `background:rgba(245,164,0,.3)`][si % 4];
            return `
  <div class="sb">
    <div class="sbl">
      <div class="sbl-row">
        <div class="sbl-ic">
          <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 6 10-6-10-6zM2 14l10 6 10-6"/></svg>
        </div>
        <div>
          <div class="sbl-n">EduControl</div>
          <div class="sbl-s">${role}</div>
        </div>
      </div>
    </div>
    <div class="sb-nav" id="nav-wrap" style="padding-top:8px">
      ${items.map((it, i) => `
        <div class="si ${i === 0 ? 'active' : ''}" data-pg="${it.id}" style="animation-delay:${i * .04}s">
          ${it.ic} ${it.label}
          ${it.bdg ? `<span class="si-bdg" id="${it.bdg}" style="display:none">0</span>` : ''}
        </div>`).join('')}
    </div>
    <div class="sb-ft">
      <div class="sb-usr">
        <div class="sb-av" style="${avS};color:#fff">${ini(user.name)}</div>
        <div>
          <div class="sb-un">${user.name}</div>
          <div class="sb-ur">${user.role === 'admin' ? 'Administrator' : "O'quvchi"}</div>
        </div>
        <div class="sb-lo" onclick="logout()" title="Chiqish">${IC.out}</div>
      </div>
    </div>
  </div>`;
        }

        // ============================================================
        //  ADMIN — BUILD
        // ============================================================
        function buildAdmin() {
            const items = [
                { id: 'dash', ic: IC.dash, label: 'Dashboard' },
                { id: 'studs', ic: IC.users, label: "O'quvchilar" },
                { id: 'tasks', ic: IC.task, label: 'Vazifalar', bdg: 'a-sub-bdg' },
                { id: 'mkt', ic: IC.mkt, label: 'Market' },
                { id: 'att', ic: IC.att, label: 'Davomat' },
            ];
            $('app').innerHTML = `
  <div class="shell">
    ${buildSidebar(items, DB.u, 'Admin Panel')}
    <div class="main">
      <div class="topbar">
        <div class="tb-t" id="a-tit">Dashboard</div>
        <div class="tb-r">
          <span style="font-size:11px;color:var(--t2)">${today()}</span>
        </div>
      </div>
      <div class="cnt" id="a-cnt">
        <div class="pg active" id="a-pg-dash"></div>
        <div class="pg"        id="a-pg-studs"></div>
        <div class="pg"        id="a-pg-tasks"></div>
        <div class="pg"        id="a-pg-mkt"></div>
        <div class="pg"        id="a-pg-att"></div>
      </div>
    </div>
  </div>
  ${adminModals()}`;

            document.querySelectorAll('.si').forEach(el => el.addEventListener('click', () => {
                document.querySelectorAll('.si').forEach(s => s.classList.remove('active'));
                el.classList.add('active');
                document.querySelectorAll('#a-cnt .pg').forEach(p => p.classList.remove('active'));
                const pg = el.dataset.pg;
                $('a-pg-' + pg).classList.add('active');
                const titles = { dash: 'Dashboard', studs: "O'quvchilar", tasks: 'Vazifalar', mkt: 'Market', att: 'Davomat' };
                $('a-tit').textContent = titles[pg] || pg;
                ({ dash: rADash, studs: rAStuds, tasks: rATasks, mkt: rAMkt, att: rAAtt }[pg] || function () { })();
            }));
            updSubBdg(); rADash();
        }

        function updSubBdg() {
            const n = DB.subs.filter(s => s.status === 'pending').length;
            const el = $('a-sub-bdg');
            if (el) { el.textContent = n; el.style.display = n > 0 ? 'inline-block' : 'none'; }
        }

        // ---- ADMIN: DASHBOARD ----
        function rADash() {
            const ss = studs();
            const tdAtt = DB.att.filter(a => a.date === today() && a.t === 'came').length;
            const pend = DB.subs.filter(s => s.status === 'pending').length;
            const totalC = DB.subs.filter(s => s.status === 'approved').reduce((a, s) => a + s.coins, 0);
            const mets = [
                { l: "Jami o'quvchilar", v: ss.length, s: 'Faol', c: 'var(--ac)' },
                { l: 'Bugun keldi', v: tdAtt, s: today(), c: 'var(--gr)' },
                { l: 'Kutilayotgan', v: pend, s: 'Tekshiruv', c: 'var(--am)' },
                { l: 'Berilgan coinlar', v: fc(totalC), s: 'Jami', c: 'var(--go)' },
            ];
            $('a-pg-dash').innerHTML = `
    <div class="mcs">
      ${mets.map((m, i) => `
        <div class="mc st" style="animation-delay:${i * .06}s">
          <div class="mc-l">${m.l}</div>
          <div class="mc-v" style="color:${m.c}">${m.v}</div>
          <div class="mc-s">${m.s}</div>
        </div>`).join('')}
    </div>
    <div class="g2">
      <div>
        <div class="sh"><div class="sht">O'quvchilar holati</div></div>
        <div class="tc">
          <table><thead><tr><th>Ism</th><th>Coinlar</th><th>Bugun</th></tr></thead>
          <tbody>
            ${ss.map((s, i) => {
                const a = DB.att.filter(x => x.sid === s.id && x.date === today());
                const came = a.some(x => x.t === 'came');
                const left = a.some(x => x.t === 'left');
                const pill = came ? (left ? `<span class="pl p-am">Ketdi</span>` : `<span class="pl p-gr">Keldi</span>`) : `<span class="pl p-gy">Kelmadi</span>`;
                return `<tr class="st" style="animation-delay:${i * .04}s">
                <td><div class="nc"><div class="av ${avC(i)}">${ini(s.name)}</div><span style="font-weight:500">${s.name}</span></div></td>
                <td><span style="color:var(--go);font-weight:600">${fc(s.coins)}</span></td>
                <td>${pill}</td>
              </tr>`;
            }).join('')}
          </tbody></table>
        </div>
      </div>
      <div>
        <div class="sh"><div class="sht">So'nggi topshirishlar</div></div>
        ${DB.subs.length === 0
                    ? `<div class="empty"><div class="empty-e">📋</div><div class="empty-t">Hali topshirish yo'q</div></div>`
                    : `<div class="tc"><table><thead><tr><th>O'quvchi</th><th>Vazifa</th><th>Holat</th></tr></thead>
             <tbody>
               ${[...DB.subs].reverse().slice(0, 5).map(sub => {
                        const st = uById(sub.sid);
                        const tk = DB.tasks.find(t => t.id === sub.tid);
                        const p = sub.status === 'pending' ? `<span class="pl p-am">Kutilmoqda</span>`
                            : sub.status === 'approved' ? `<span class="pl p-gr">Tasdiqlandi</span>`
                                : `<span class="pl p-re">Rad etildi</span>`;
                        return `<tr><td>${st ? st.name : '—'}</td><td style="font-size:11.5px;color:var(--t1)">${tk ? tk.title : '—'}</td><td>${p}</td></tr>`;
                    }).join('')}
             </tbody></table></div>`}
      </div>
    </div>`;
        }

        // ---- ADMIN: STUDENTS ----
        function rAStuds() {
            const ss = studs();
            $('a-pg-studs').innerHTML = `
    <div class="sh"><div class="sht">O'quvchilar</div></div>
    <div class="tc">
      <table>
        <thead><tr><th>Ism</th><th>Login</th><th>Coinlar</th><th>Bugun</th><th>Amallar</th></tr></thead>
        <tbody>
          ${ss.map((s, i) => {
                const a = DB.att.filter(x => x.sid === s.id && x.date === today());
                const came = a.some(x => x.t === 'came');
                const left = a.some(x => x.t === 'left');
                const pill = came ? (left ? `<span class="pl p-am">Ketdi</span>` : `<span class="pl p-gr">Keldi</span>`) : `<span class="pl p-gy">Kelmadi</span>`;
                return `<tr class="st" style="animation-delay:${i * .05}s">
              <td><div class="nc"><div class="av ${avC(i)}">${ini(s.name)}</div><span style="font-weight:500">${s.name}</span></div></td>
              <td style="font-family:var(--mono);font-size:12px;color:var(--t1)">${s.login}</td>
              <td><span style="color:var(--go);font-weight:600">${fc(s.coins)}</span></td>
              <td>${pill}</td>
              <td>
                <div style="display:flex;gap:5px;flex-wrap:wrap">
                  <button class="btn btn-sm btn-go" onclick="openGC(${s.id})">🪙 Coin</button>
                  ${!came ? `<button class="btn btn-sm btn-g" onclick="markA(${s.id},'came');rAStuds()">✓ Keldi</button>` : ''}
                  ${came && !left ? `<button class="btn btn-sm btn-r" onclick="markA(${s.id},'left');rAStuds()">← Ketdi</button>` : ''}
                </div>
              </td>
            </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>`;
        }

        function markA(sid, type) {
            if (DB.att.find(a => a.sid === sid && a.date === today() && a.t === type)) return;
            DB.att.push({ id: DB.nid.att++, sid, date: today(), t: type, time: nowT() });
            const s = uById(sid);
            toast(`${s.name} ${type === 'came' ? 'keldi ✓' : 'ketdi'}`, type === 'came' ? 'ok' : 'warn');
        }

        function openGC(sid) {
            const s = uById(sid);
            $('gc-n').textContent = s.name;
            $('gc-id').value = sid;
            $('gc-amt').value = '';
            $('gc-rsn').value = '';
            openM('m-gc');
        }
        function doGC() {
            const sid = parseInt($('gc-id').value);
            const amt = parseInt($('gc-amt').value) || 0;
            if (amt <= 0) { toast('Miqdor kiriting!', 'err'); return; }
            const s = uById(sid);
            s.coins += amt;
            closeM('m-gc');
            toast(`${s.name}ga ${fc(amt)} berildi! ✨`, 'ok');
            rAStuds(); rADash();
        }

        // ---- ADMIN: TASKS ----
        function rATasks() {
            const pend = DB.subs.filter(s => s.status === 'pending').length;
            $('a-pg-tasks').innerHTML = `
    <div class="sh">
      <div class="sht">Vazifalar</div>
      <button class="btn btn-p btn-sm" onclick="prepNT();openM('m-nt')">+ Yangi vazifa</button>
    </div>
    <div class="g2">
      <div>
        <div class="sh"><div class="sht">Barcha vazifalar (${DB.tasks.length})</div></div>
        ${DB.tasks.length === 0
                    ? `<div class="empty"><div class="empty-t">Hali vazifa yo'q</div></div>`
                    : DB.tasks.map((t, i) => `
            <div class="card st" style="animation-delay:${i * .05}s">
              <div class="ct">${t.title}</div>
              <div class="cd">${t.desc}</div>
              <div class="cf">
                <span class="pl p-go">${fc(t.coins)}</span>
                <span class="pl p-bl">${t.to === 'all' ? "Hammaga" : uById(t.to)?.name || '—'}</span>
                <span style="font-size:11px;color:var(--t2)">⏰ ${t.deadline}</span>
                <button class="btn btn-sm btn-r" onclick="delTask(${t.id})" style="margin-left:auto">Bekor</button>
              </div>
            </div>`).join('')}
      </div>
      <div>
        <div class="sh">
          <div class="sht" style="display:flex;gap:8px;align-items:center">
            Topshirishlar ${pend > 0 ? `<span class="pl p-am">${pend} kutilmoqda</span>` : ''}
          </div>
        </div>
        ${DB.subs.length === 0
                    ? `<div class="empty"><div class="empty-e">📬</div><div class="empty-t">Hali topshirish yo'q</div></div>`
                    : [...DB.subs].reverse().map((sub, i) => {
                        const st = uById(sub.sid);
                        const tk = DB.tasks.find(t => t.id === sub.tid);
                        const si2 = studs().findIndex(s => s.id === sub.sid);
                        const pill = sub.status === 'pending' ? `<span class="pl p-am">Kutilmoqda</span>`
                            : sub.status === 'approved' ? `<span class="pl p-gr">Tasdiqlandi ✓</span>`
                                : `<span class="pl p-re">Rad etildi</span>`;
                        return `
              <div class="card st" style="animation-delay:${i * .05}s">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                  <div class="av ${avC(si2)}">${st ? ini(st.name) : '?'}</div>
                  <div style="flex:1">
                    <div style="font-weight:500;font-size:13px">${st ? st.name : '—'}</div>
                    <div style="font-size:11px;color:var(--t1)">${tk ? tk.title : '—'}</div>
                  </div>
                  <div>${pill}</div>
                </div>
                ${sub.img
                                ? `<img src="${sub.img}" style="width:100%;max-height:130px;object-fit:cover;border-radius:6px;margin-bottom:8px;cursor:zoom-in" onclick="viewImg(${sub.id})">`
                                : `<div style="background:var(--b2);border-radius:6px;padding:10px;text-align:center;font-size:11.5px;color:var(--t2);margin-bottom:8px">Rasm yuklanmagan</div>`}
                <div style="font-size:11px;color:var(--t2);margin-bottom:8px">📅 ${sub.date}</div>
                ${sub.status === 'pending' ? `
                  <div style="display:flex;gap:6px">
                    <button class="btn btn-g btn-sm" onclick="openApr(${sub.id})">✓ Tasdiqlash</button>
                    <button class="btn btn-r btn-sm" onclick="rejSub(${sub.id})">✗ Rad etish</button>
                  </div>` : ''}
              </div>`;
                    }).join('')}
      </div>
    </div>`;
        }

        function delTask(id) {
            DB.tasks = DB.tasks.filter(t => t.id !== id);
            toast("Vazifa o'chirildi", 'warn');
            rATasks();
        }
        function openApr(sid) {
            const sub = DB.subs.find(s => s.id === sid);
            const tk = DB.tasks.find(t => t.id === sub.tid);
            $('ap-id').value = sid;
            $('ap-c').value = tk ? tk.coins : 50;
            openM('m-apr');
        }
        function doApr() {
            const sid = parseInt($('ap-id').value);
            const c = parseInt($('ap-c').value) || 0;
            const sub = DB.subs.find(s => s.id === sid);
            const st = uById(sub.sid);
            sub.status = 'approved';
            sub.coins = c;
            st.coins += c;
            closeM('m-apr'); updSubBdg();
            toast(`${st.name}ga ${fc(c)} berildi! 🎉`, 'ok');
            rATasks(); rADash();
        }
        function rejSub(sid) {
